name: Update Claude Code Guide

on:
  schedule:
    - cron: "0 8 * * *"   # daily at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-guide
  cancel-in-progress: true

jobs:
  update-guide:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @anthropic-ai/claude-code

      # Claude searches the web and edits content.yaml ONLY
      - name: Check for updates
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "$(cat .github/prompts/update-guide-prompt.md)" \
            --allowedTools "WebSearch,WebFetch,Read,Edit" \
            --max-turns 25 \
            --model claude-sonnet-4-6 \
            --output-format text > /tmp/claude-summary.txt 2>&1 || true
          cat /tmp/claude-summary.txt

      # Deterministic validation — catches structural errors Claude might make
      - name: Validate content
        if: always()
        run: python3 validate_content.py

      # Only proceed if content.yaml actually changed
      - name: Check for changes
        id: diff
        run: git diff --quiet content.yaml || echo "changed=true" >> "$GITHUB_OUTPUT"

      # Generate a descriptive commit message from the diff
      - name: Build commit message
        if: steps.diff.outputs.changed == 'true'
        run: |
          {
            echo "chore: auto-update guide content $(date +%Y-%m-%d)"
            echo ""
            # List changed sections by extracting added/removed lines
            git diff content.yaml | grep '^[+-]' | grep -v '^[+-][+-][+-]' | \
              grep -oP '(?<=title: ").*(?=")' | sort -u | \
              while read -r section; do echo "- $section"; done
            # Summarize additions/deletions
            ADDS=$(git diff content.yaml | grep -c '^+' || true)
            DELS=$(git diff content.yaml | grep -c '^-' || true)
            echo ""
            echo "+${ADDS}/-${DELS} lines in content.yaml"
            echo ""
            echo "Co-Authored-By: Claude <noreply@anthropic.com>"
          } > /tmp/commit-msg.txt

      - name: Regenerate PDF
        if: steps.diff.outputs.changed == 'true'
        run: python3 generate_guide.py

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content.yaml Claude_Code_Tips_and_Best_Practices.pdf
          git commit -F /tmp/commit-msg.txt
          git push
